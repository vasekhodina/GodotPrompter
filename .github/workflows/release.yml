name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify version consistency and validate skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify version consistency
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          PLUGIN=$(node -p "require('./.claude-plugin/plugin.json').version")
          MARKET=$(node -p "require('./.claude-plugin/marketplace.json').plugins[0].version")
          echo "tag=$TAG  package.json=$PKG  plugin.json=$PLUGIN  marketplace.json=$MARKET"
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$PLUGIN" ] || [ "$TAG" != "$MARKET" ]; then
            echo "::error::Version drift between tag and in-repo files"
            exit 1
          fi

      - name: Run skill validator
        run: node scripts/validate-skills.mjs

  release:
    name: Create GitHub release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract CHANGELOG section for this version
        id: changelog
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Extract the section between "## [VERSION]" and the next "## [" header
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-body.md
          if [ ! -s /tmp/release-body.md ]; then
            echo "::error::No CHANGELOG section found for v$VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.changelog.outputs.version }}" \
            --title "v${{ steps.changelog.outputs.version }}" \
            --notes-file /tmp/release-body.md \
            --latest

  marketplace-prs:
    name: Open marketplace bump PRs
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check for marketplace token
        id: token-check
        run: |
          if [ -z "${{ secrets.MARKETPLACE_TOKEN }}" ]; then
            echo "::warning::MARKETPLACE_TOKEN secret not set — skipping marketplace PRs. Bump skillsmith/.claude-plugin/marketplace.json and godot-prompter-marketplace/.claude-plugin/marketplace.json manually per CONTRIBUTING.md."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.token-check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Open PR against skillsmith
        if: steps.token-check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          V="${VERSION#v}"
          BRANCH="bump/godot-prompter-$V"
          gh repo clone jame581/skillsmith /tmp/skillsmith
          cd /tmp/skillsmith
          git config user.name "godot-prompter-bot"
          git config user.email "noreply@github.com"
          git checkout -b "$BRANCH"
          node -e "
            const fs=require('fs');
            const p='.claude-plugin/marketplace.json';
            const j=JSON.parse(fs.readFileSync(p,'utf8'));
            const i=j.plugins.findIndex(x=>x.name==='godot-prompter');
            if(i<0){console.error('godot-prompter plugin not found in skillsmith marketplace');process.exit(1);}
            j.plugins[i].version='$V';
            fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');
          "
          git add .claude-plugin/marketplace.json
          git commit -m "chore: bump godot-prompter to $V"
          git push -u origin "$BRANCH"
          gh pr create --title "Bump godot-prompter to $V" --body "Automated bump from godot-prompter v$V release."

      - name: Open PR against godot-prompter-marketplace
        if: steps.token-check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          V="${VERSION#v}"
          BRANCH="bump/godot-prompter-$V"
          gh repo clone jame581/godot-prompter-marketplace /tmp/legacy
          cd /tmp/legacy
          git config user.name "godot-prompter-bot"
          git config user.email "noreply@github.com"
          git checkout -b "$BRANCH"
          node -e "
            const fs=require('fs');
            const p='.claude-plugin/marketplace.json';
            const j=JSON.parse(fs.readFileSync(p,'utf8'));
            const i=j.plugins.findIndex(x=>x.name==='godot-prompter');
            if(i<0){console.error('godot-prompter plugin not found in legacy marketplace');process.exit(1);}
            j.plugins[i].version='$V';
            fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');
          "
          git add .claude-plugin/marketplace.json
          git commit -m "chore: bump godot-prompter to $V"
          git push -u origin "$BRANCH"
          gh pr create --title "Bump godot-prompter to $V" --body "Automated bump from godot-prompter v$V release. Legacy marketplace — for existing installs only."
